# Build and publish the optional MLX ASR runtime.
#
# This is intentionally separate from the app release. The worker is large, so
# Freestyle downloads it on demand instead of bundling it into every DMG.
# GitHub immutable releases require the asset to be attached when the release is
# created, so keep the create command and asset path in the same step.

name: MLX ASR Runtime

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Runtime release tag to create
        required: true
        type: string
        default: mlx-asr-worker-v2

permissions:
  contents: write

jobs:
  build:
    name: Build runtime archive
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build MLX ASR worker archive
        run: ./scripts/build_mlx_asr_worker.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: mlx-asr-worker-darwin-arm64
          path: dist/mlx_asr_worker-darwin-arm64.tar.gz
          if-no-files-found: error

      - name: Publish runtime release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          ASSET: dist/mlx_asr_worker-darwin-arm64.tar.gz
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release $RELEASE_TAG already exists. Use a new runtime tag and update MLX_WORKER_RELEASE in runtime.ts."
            exit 1
          fi

          gh release create "$RELEASE_TAG" "$ASSET" \
            --title "MLX ASR Worker ${RELEASE_TAG#mlx-asr-worker-}" \
            --notes "Optional Freestyle runtime for local MLX ASR (Qwen3, Parakeet, Whisper, etc.)."
